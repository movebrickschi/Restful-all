<svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Dark rounded background -->
    <rect width="40" height="40" rx="8" fill="#1E1F22"/>

    <!-- Route branches -->
    <path d="M8 20 L15 20" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M15 20 L21 11 L32 11" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M15 20 L32 20" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <path d="M15 20 L21 29 L32 29" stroke="url(#lineGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Source node -->
    <circle cx="8" cy="20" r="3" fill="url(#dotGrad)"/>

    <!-- Endpoint nodes -->
    <circle cx="32" cy="11" r="2.5" fill="#3BEA62"/>
    <circle cx="32" cy="20" r="2.5" fill="#3C99CC"/>
    <circle cx="32" cy="29" r="2.5" fill="#6B57FF"/>

    <defs>
        <linearGradient id="lineGrad" x1="8" y1="11" x2="32" y2="29">
            <stop offset="0" stop-color="#3BEA62"/>
            <stop offset="0.5" stop-color="#3C99CC"/>
            <stop offset="1" stop-color="#6B57FF"/>
        </linearGradient>
        <linearGradient id="dotGrad" x1="5" y1="17" x2="11" y2="23">
            <stop offset="0" stop-color="#3BEA62"/>
            <stop offset="1" stop-color="#3C99CC"/>
        </linearGradient>
    </defs>
</svg>
